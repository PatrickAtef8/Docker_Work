name: C++ CI

# Run this workflow on every push or PR to master
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code from GitHub
      - uses: actions/checkout@v4

      # Step 2: Install C++ compiler (g++)
      - name: Install g++
        run: sudo apt update && sudo apt install -y g++

      # Step 3: Compile your program
      - name: Compile C++ program
        run: g++ 01-understanding-docker/main.cpp -o main

      # Step 4: Run your program (optional test)
      - name: Run program
        run: ./main

      # Step 5: Optional: Run linter / formatter
      - name: Run clang-format
        run: |
          sudo apt install -y clang-format
          clang-format -i 01-understanding-docker/main.cpp
